<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fernweh</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap');

  :root {
    --overlay-bg: rgba(0, 0, 0, 0.55);
    --text-primary: rgba(255, 255, 255, 0.92);
    --text-secondary: rgba(255, 255, 255, 0.55);
    --text-dim: rgba(255, 255, 255, 0.25);
    --accent: rgba(255, 90, 60, 0.9);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Silkscreen', cursive;
    color: var(--text-primary);
    cursor: none;
    user-select: none;
  }

  /* --- Video Layers --- */
  .video-layer {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }
  .video-layer iframe {
    width: 100%; height: 100%;
    border: none;
    pointer-events: none;
  }
  .video-layer.hidden { display: none; }
  .video-layer.visible { display: block; }

  /* --- TV Noise overlay --- */
  .noise-overlay {
    position: absolute;
    inset: 0;
    z-index: 3;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s ease;
  }
  .noise-overlay.active { opacity: 1; }
  .noise-overlay canvas {
    width: 100%; height: 100%;
  }

  /* --- Vignette overlay --- */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%),
      linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 20%),
      linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 10%);
  }

  /* --- Info Overlay --- */
  .info-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 40px 50px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.8s ease, transform 0.8s ease, padding 60s ease;
  }
  .info-overlay.show {
    opacity: 1;
    transform: translateY(0);
  }

  .info-channel {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .info-title {
    font-size: 22px;
    font-weight: 300;
    line-height: 1.4;
    color: var(--text-primary);
    max-width: 700px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-decoration: none;
    display: block;
  }
  .info-title:hover { text-decoration: underline; }

  /* --- Top-right Clock --- */
  .clock-overlay {
    position: absolute;
    top: 30px;
    right: 50px;
    z-index: 10;
    text-align: right;
    opacity: 0;
    transition: opacity 0.8s ease, top 60s ease, right 60s ease;
    background: var(--overlay-bg);
    padding: 16px 20px;
    border-radius: 8px;
    backdrop-filter: blur(6px);
  }
  .clock-overlay.show { opacity: 1; }

  .clock-time {
    font-size: 56px;
    font-weight: 200;
    letter-spacing: 4px;
    color: var(--text-primary);
    line-height: 1;
  }
  .clock-date {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* --- Weather location name --- */
  .weather-location {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 3px;
    text-align: right;
    text-transform: uppercase;
  }

  /* --- Weather (below clock) --- */
  .weather-section {
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .weather-day {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .weather-label {
    color: var(--text-dim);
    font-size: 18px;
    letter-spacing: 3px;
    min-width: 50px;
    text-align: right;
  }

  .weather-icon {
    font-size: 18px;
    line-height: 1;
  }

  .weather-temp {
    color: var(--text-secondary);
    font-size: 18px;
    font-weight: 200;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    min-width: 90px;
    text-align: right;
  }

  .weather-precip {
    color: var(--text-secondary);
    font-size: 18px;
    letter-spacing: 1px;
    min-width: 44px;
    text-align: right;
  }

  /* --- Globe --- */
  .globe-container {
    position: absolute;
    bottom: 40px;
    right: 50px;
    z-index: 12;
    width: 225px;
    height: 225px;
    opacity: 0;
    transition: opacity 1.2s ease;
    pointer-events: none;
  }
  .globe-container.show { opacity: 0.95; }
  .globe-label {
    position: absolute;
    width: max-content;
    text-align: center;
    transform: translate(-50%, -50%);
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    background: rgba(51, 102, 255, 0.9);
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 0;
    white-space: pre-line;
    line-height: 1.2;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .globe-label.show { opacity: 1; }
  .globe-container canvas {
    width: 100%;
    height: 100%;
    filter: invert(1);
  }

  /* --- Live indicator --- */
  .live-badge {
    position: absolute;
    top: 38px;
    left: 50px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.8s ease, top 60s ease, left 60s ease;
  }
  .live-badge.show { opacity: 1; }

  .live-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .live-text {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* --- Progress bar (time until next switch) --- */
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 4px;
    background: var(--accent);
    z-index: 15;
    transition: width 1s linear;
    opacity: 0.6;
  }

  /* --- Controls (right edge, vertically centered) --- */
  .controls {
    position: absolute;
    top: 50%;
    right: 30px;
    transform: translateY(-50%) translateX(4px);
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  body.mouse-active .controls {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(-50%);
  }
  body.mouse-active { cursor: default; }

  .ctrl-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: var(--overlay-bg);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    font-size: 16px;
  }
  .ctrl-btn:hover {
    border-color: rgba(255,255,255,0.5);
    color: var(--text-primary);
    background: rgba(255,255,255,0.1);
  }
  a.ctrl-btn { text-decoration: none; }

  /* --- Loading state --- */
  .loading-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: opacity 0.3s ease;
  }
  .loading-overlay.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .loading-text {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #fff;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px 24px;
    border-radius: 4px;
    animation: breathe 2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* --- Error --- */
  .error-overlay {
    position: absolute;
    inset: 0;
    z-index: 25;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
  }
  .error-overlay.show {
    display: flex;
  }
  .error-msg {
    font-size: 14px;
    font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<!-- Two video layers for crossfade -->
<div class="video-layer visible" id="layer-a">
  <div id="player-a"></div>
</div>
<div class="video-layer hidden" id="layer-b">
  <div id="player-b"></div>
</div>

<!-- TV Noise -->
<div class="noise-overlay" id="noise-overlay">
  <canvas id="noise-canvas"></canvas>
</div>

<!-- Vignette -->
<div class="vignette"></div>

<!-- Live badge -->
<div class="live-badge" id="live-badge">
  <div class="live-dot"></div>
  <span class="live-text">Live</span>
</div>

<!-- Clock -->
<div class="clock-overlay" id="clock">
  <div class="clock-time" id="clock-time"></div>
  <div class="clock-date" id="clock-date"></div>
  <div class="weather-location" id="weather-location"></div>
  <div class="weather-section" id="weather"></div>
</div>

<!-- Globe -->
<div class="globe-container" id="globe-container">
  <canvas id="globe-canvas"></canvas>
  <div class="globe-label" id="globe-label"></div>
</div>

<!-- Controls (right edge, vertically centered) -->
<div class="controls">
  <div class="ctrl-btn" id="btn-skip" title="Skip">⏭</div>
  <div class="ctrl-btn" id="btn-fullscreen" title="Fullscreen">⛶</div>
  <a class="ctrl-btn" id="btn-info" title="About" href="https://github.com/ubiquitous-o/Fernweh">ℹ</a>
</div>

<!-- Info -->
<div class="info-overlay" id="info">
  <div class="info-channel" id="info-channel"></div>
  <a class="info-title" id="info-title" href="#"></a>
</div>

<!-- Progress -->
<div class="progress-bar" id="progress"></div>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="loading-text">Exploring the world live camera...</div>
</div>

<!-- Error -->
<div class="error-overlay" id="error">
  <div class="error-msg" id="error-msg">Connection error</div>
</div>

<script>
  // ===== CONFIG =====

  // ===== STATE =====
  let activeLayer = 'a';
  let switchTimer = null;
  let progressTimer = null;
  let switchStartTime = 0;
  let mouseTimer = null;
  let currentInfo = null;

  // ===== TV NOISE (WebGL shader — GPU描画、CPU負荷ゼロ) =====
  const $noiseOverlay = document.getElementById('noise-overlay');
  const $noiseCanvas = document.getElementById('noise-canvas');

  const noiseGL = (() => {
    const canvas = $noiseCanvas;
    let gl, uTime, uRes, animId = null, wasRunning = false;

    const vsSource = `
      attribute vec2 a_pos;
      void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
    `;
    const fsSource = `
      precision highp float;
      uniform float u_time;
      uniform vec2 u_resolution;

      // Dave Hoskins hash — 全GPU安定、パターンなし
      float hash(vec3 p3) {
        p3 = fract(p3 * 0.1031);
        p3 += dot(p3, p3.zyx + 31.32);
        return fract((p3.x + p3.y) * p3.z);
      }

      void main() {
        vec2 block = floor(gl_FragCoord.xy / vec2(3.0, 2.0));
        float t = floor(u_time * 24.0);
        float n = hash(vec3(block, t));
        float scanline = 1.0 - 0.15 * step(0.5, fract(gl_FragCoord.y / 4.0));
        float flicker = 0.92 + 0.08 * hash(vec3(t, 0.0, 0.0));
        gl_FragColor = vec4(vec3(n * scanline * flicker), 1.0);
      }
    `;

    function initGL() {
      gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (!gl) return false;

      function compileShader(type, source) {
        const s = gl.createShader(type);
        gl.shaderSource(s, source);
        gl.compileShader(s);
        return s;
      }

      const prog = gl.createProgram();
      gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, vsSource));
      gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, fsSource));
      gl.linkProgram(prog);
      gl.useProgram(prog);

      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
      const aPos = gl.getAttribLocation(prog, 'a_pos');
      gl.enableVertexAttribArray(aPos);
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

      uTime = gl.getUniformLocation(prog, 'u_time');
      uRes = gl.getUniformLocation(prog, 'u_resolution');
      return true;
    }

    if (!initGL()) return null;

    // コンテキスト喪失時に自動復元
    canvas.addEventListener('webglcontextlost', (e) => {
      e.preventDefault();
      wasRunning = !!animId;
      if (animId) { cancelAnimationFrame(animId); animId = null; }
    });
    canvas.addEventListener('webglcontextrestored', () => {
      initGL();
      if (wasRunning) { resize(); render(); }
    });

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
    resize();
    window.addEventListener('resize', () => { if (animId) resize(); });

    function render() {
      gl.uniform1f(uTime, performance.now() * 0.001);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      animId = requestAnimationFrame(render);
    }

    return {
      start() { if (!animId) { resize(); render(); } },
      stop() { if (animId) { cancelAnimationFrame(animId); animId = null; } },
    };
  })();

  function startNoise() {
    if (noiseGL) noiseGL.start();
    $noiseOverlay.classList.add('active');
  }

  function stopNoise() {
    $noiseOverlay.classList.remove('active');
    if (noiseGL) noiseGL.stop();
  }

  // ===== ELEMENTS =====
  const $layerA = document.getElementById('layer-a');
  const $layerB = document.getElementById('layer-b');
  const $info = document.getElementById('info');
  const $infoTitle = document.getElementById('info-title');
  const $infoChannel = document.getElementById('info-channel');
  const $clock = document.getElementById('clock');
  const $clockTime = document.getElementById('clock-time');
  const $clockDate = document.getElementById('clock-date');
  const $liveBadge = document.getElementById('live-badge');
  const $progress = document.getElementById('progress');
  const $loading = document.getElementById('loading');
  const $error = document.getElementById('error');
  const $errorMsg = document.getElementById('error-msg');
  const $globe = document.getElementById('globe-container');
  let $globeCanvas = document.getElementById('globe-canvas');
  const $globeLabel = document.getElementById('globe-label');

  // ===== YouTube IFrame Player API =====
  let ytApiReady = false;
  const players = { a: null, b: null };
  const PLAYBACK_TIMEOUT = 15000; // Skip if not playing within 15s

  const RESUME_KEY = 'fernweh_resume';

  window.onYouTubeIframeAPIReady = () => {
    ytApiReady = true;
    // 前回の動画があれば復元
    const saved = sessionStorage.getItem(RESUME_KEY);
    if (saved) {
      sessionStorage.removeItem(RESUME_KEY);
      try {
        const data = JSON.parse(saved);
        resumeVideo(data);
        return;
      } catch {}
    }
    switchVideo();
  };

  async function resumeVideo(data) {
    isSwitching = true;
    startNoise();
    try {
      const layerId = activeLayer;
      await createPlayer(layerId, data.videoId);
      currentInfo = data;
      const $layer = layerId === 'a' ? $layerA : $layerB;
      $layer.classList.remove('hidden');
      $layer.classList.add('visible');
      stopNoise();
      $loading.classList.add('fade-out');
      showInfo(data);
      showOverlays();
      updateGlobe(data.location, data.locationName);
      resetSwitchTimer();
    } catch {
      switchVideo();
    } finally {
      isSwitching = false;
    }
  }

  window.addEventListener('pagehide', () => {
    if (currentInfo) {
      sessionStorage.setItem(RESUME_KEY, JSON.stringify(currentInfo));
    }
  });

  // Fallback if YouTube IFrame API fails to load
  setTimeout(() => {
    if (!ytApiReady) {
      console.error('YouTube IFrame API failed to load. Reloading...');
      location.reload();
    }
  }, 30000);

  function createPlayer(layerId, videoId) {
    return new Promise((resolve, reject) => {
      const elementId = `player-${layerId}`;
      let settled = false;
      let timeoutId = null;

      // Timeout: fail if playback doesn't start
      timeoutId = setTimeout(() => {
        if (!settled) {
          settled = true;
          console.warn(`⏰ Playback timeout: ${videoId}`);
          reject(new Error('Playback timeout'));
        }
      }, PLAYBACK_TIMEOUT);

      // Destroy old player
      if (players[layerId]) {
        try { players[layerId].destroy(); } catch (e) {}
        players[layerId] = null;
      }

      // Recreate player div
      const $layer = layerId === 'a' ? $layerA : $layerB;
      $layer.innerHTML = `<div id="${elementId}"></div>`;

      players[layerId] = new YT.Player(elementId, {
        videoId,
        playerVars: {
          autoplay: 1,
          mute: 1,
          controls: 0,
          showinfo: 0,
          rel: 0,
          modestbranding: 1,
          iv_load_policy: 3,
          loop: 1,
          playlist: videoId,
          enablejsapi: 1,
          origin: location.origin,
        },
        events: {
          onReady: (e) => {
            e.target.mute();
            e.target.playVideo();
          },
          onStateChange: (e) => {
            // YT.PlayerState.PLAYING === 1
            if (e.data === 1 && !settled) {
              settled = true;
              clearTimeout(timeoutId);
              resolve();
            }
          },
          onError: (e) => {
            if (!settled) {
              settled = true;
              clearTimeout(timeoutId);
              console.warn(`❌ Player error (code ${e.data}): ${videoId}`);
              reject(new Error(`Player error: ${e.data}`));
            }
          },
        },
      });
    });
  }

  // ===== VIDEO POOL (from videos.json) =====
  let videoPool = [];
  let videosLoaded = false;
  let lastPoolFetch = 0;
  const POOL_REFRESH_INTERVAL = 2 * 60 * 60 * 1000; // 2時間（cron更新間隔に合わせる）

  // Track watched videos in localStorage to avoid repeats
  const WATCHED_KEY = 'fernweh_watched';
  const MAX_WATCHED = 150;

  function getWatched() {
    try {
      return JSON.parse(localStorage.getItem(WATCHED_KEY) || '[]');
    } catch { return []; }
  }

  function addWatched(videoId) {
    const watched = getWatched();
    if (!watched.includes(videoId)) {
      watched.push(videoId);
      // Keep only the most recent entries
      while (watched.length > MAX_WATCHED) watched.shift();
      localStorage.setItem(WATCHED_KEY, JSON.stringify(watched));
    }
  }

  async function loadVideoPool() {
    const res = await fetch('videos.json');
    if (!res.ok) throw new Error(`Failed to load videos.json: ${res.status}`);
    const allVideos = await res.json();

    // Filter out already-watched videos
    const watched = new Set(getWatched());
    videoPool = allVideos.filter(v => !watched.has(v.videoId));

    // If all have been watched, reset and use the full list
    if (videoPool.length === 0) {
      localStorage.removeItem(WATCHED_KEY);
      videoPool = [...allVideos];
    }

    // Shuffle for variety
    for (let i = videoPool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [videoPool[i], videoPool[j]] = [videoPool[j], videoPool[i]];
    }

    videosLoaded = true;
    lastPoolFetch = Date.now();
  }

  // Fallback location extraction for videos without location data
  const KNOWN_LOCATIONS = {
    'Tokyo':[35.68,139.69],'New York':[40.71,-74.01],'Paris':[48.86,2.35],
    'London':[51.51,-0.13],'Bangkok':[13.76,100.50],'Dubai':[25.20,55.27],
    'Sydney':[-33.87,151.21],'Rio':[-22.91,-43.17],'Istanbul':[41.01,28.98],
    'Rome':[41.90,12.50],'Barcelona':[41.39,2.17],'Amsterdam':[52.37,4.90],
    'Seoul':[37.57,126.98],'Singapore':[1.35,103.82],'Hong Kong':[22.32,114.17],
    'Mumbai':[19.08,72.88],'Cairo':[30.04,31.24],'Cape Town':[-33.93,18.42],
    'Vancouver':[49.28,-123.12],'Reykjavik':[64.15,-21.94],
    'Oslo':[59.91,10.75],'Helsinki':[60.17,24.94],'Prague':[50.08,14.44],
    'Vienna':[48.21,16.37],'Zurich':[47.38,8.54],'Lisbon':[38.72,-9.14],
    'Athens':[37.98,23.73],'Santorini':[36.39,25.46],'Bali':[-8.34,115.09],
    'Hawaii':[21.31,-157.86],'Alaska':[61.22,-149.90],
    'Venice':[45.44,12.32],'Venice Beach':[33.99,-118.47],
    'San Diego':[32.72,-117.16],'San Francisco':[37.77,-122.42],
    'Los Angeles':[34.05,-118.24],'Chicago':[41.88,-87.63],
    'Miami':[25.76,-80.19],'Seattle':[47.61,-122.33],
    'Berlin':[52.52,13.41],'Stockholm':[59.33,18.07],

  const KNOWN_NAMES_SORTED = Object.keys(KNOWN_LOCATIONS).sort((a, b) => b.length - a.length);

  function guessLocation(title, channel) {
    // タイトル優先 → チャンネル名の順で検索（queryは使わない）
    for (const key of KNOWN_NAMES_SORTED) {
      const re = new RegExp(`\\b${key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`, 'i');
      if (re.test(title)) return { coords: KNOWN_LOCATIONS[key], name: KNOWN_LABELS[key] || key };
    }
    if (channel) {
      for (const key of KNOWN_NAMES_SORTED) {
        const re = new RegExp(`\\b${key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`, 'i');
        if (re.test(channel)) return { coords: KNOWN_LOCATIONS[key], name: KNOWN_LABELS[key] || key };
      }
    }
    return null;
  }

  async function fetchNext() {
    const poolStale = Date.now() - lastPoolFetch > POOL_REFRESH_INTERVAL;
    if (!videosLoaded || videoPool.length === 0 || poolStale) {
      await loadVideoPool();
    }
    if (videoPool.length === 0) {
      throw new Error('No videos available in videos.json');
    }
    const video = videoPool.shift();
    addWatched(video.videoId);
    // Add location if missing
    if (!video.location) {
      const guess = guessLocation(video.title, video.channel);
      if (guess) {
        video.location = guess.coords;
        video.locationName = guess.name;
      }
    }
    return video;
  }

  // ===== SWITCH VIDEO =====
  let isSwitching = false;

  async function switchVideo() {
    if (!ytApiReady || isSwitching) return;
    isSwitching = true;

    // 即座に砂嵐表示
    startNoise();

    try {
      $error.classList.remove('show');
      const data = await fetchNext();

      const nextLayerId = activeLayer === 'a' ? 'b' : 'a';
      const $nextLayer = nextLayerId === 'a' ? $layerA : $layerB;
      const $currentLayer = activeLayer === 'a' ? $layerA : $layerB;

      await createPlayer(nextLayerId, data.videoId);

      // 再生開始 → 即座に切替
      currentInfo = data;

      $nextLayer.classList.remove('hidden');
      $nextLayer.classList.add('visible');
      $currentLayer.classList.remove('visible');
      $currentLayer.classList.add('hidden');

      // 旧プレーヤーを即破棄
      const oldLayerId = activeLayer;
      if (players[oldLayerId]) {
        try { players[oldLayerId].destroy(); } catch (e) {}
        players[oldLayerId] = null;
      }
      $currentLayer.innerHTML = `<div id="player-${oldLayerId}"></div>`;

      activeLayer = nextLayerId;

      // 砂嵐停止
      stopNoise();

      // Hide loading
      $loading.classList.add('fade-out');

      // Show info
      showInfo(data);
      showOverlays();

      // Update globe
      updateGlobe(data.location, data.locationName);

      // Reset timer
      resetSwitchTimer();

    } catch (err) {
      console.error('switchVideo error:', err);
      stopNoise();
      const delay = err.retryAfter > 0 ? err.retryAfter * 1000 : 3000;
      setTimeout(switchVideo, delay);
    } finally {
      isSwitching = false;
    }
  }

  function msUntilNextHour() {

    next.setHours(next.getHours() + 1, 0, 0, 0);
    return next - now;

  function resetSwitchTimer() {
    clearTimeout(switchTimer);
    clearInterval(progressTimer);

    switchTimer = setTimeout(switchVideo, msUntilNextHour());

    // プログレスバーは現在時刻の「1時間内の位置」を反映
    function updateProgress() {
      const now = new Date();
      const pct = (now.getMinutes() * 60 + now.getSeconds()) / 3600 * 100;
      $progress.style.width = `${pct}%`;

    updateProgress();
    progressTimer = setInterval(updateProgress, 1000);

  // ===== GLOBE =====
  let globeInstance = null;
  let createGlobeFn = null;

  // Preload COBE library
  import('https://esm.sh/cobe@0.6.3')
    .then(m => { createGlobeFn = m.default; })
    .catch(e => console.warn('Globe library failed to load:', e));

  function updateGlobe(location, locationName) {
    if (!createGlobeFn) return;

    // Destroy previous instance and explicitly free WebGL context
    if (globeInstance) {
      globeInstance.destroy();
      globeInstance = null;
    }
    const oldGl = $globeCanvas.getContext('webgl');
    if (oldGl) {
      const ext = oldGl.getExtension('WEBGL_lose_context');
      if (ext) ext.loseContext();
    }
    const freshCanvas = document.createElement('canvas');
    $globeCanvas.replaceWith(freshCanvas);
    $globeCanvas = freshCanvas;

    const hasLocation = location && Array.isArray(location);
    const markers = hasLocation
      ? [{ location, size: 0.08 }]
      : [];

    // Label: show location name or "Location unknown"
    if (hasLocation && locationName) {
      $globeLabel.textContent = locationName.replace(/,\s*/g, '\n');
      $globeLabel.style.fontSize = '20px';
      $globeLabel.classList.add('show');
      $globeLabel.style.left = '';
      $globeLabel.style.top = '';
      $globeLabel.style.opacity = '';
      $globeLabel.style.transform = 'translate(-50%, -100%)';
      $globeLabel.style.textAlign = '';
    } else if (!hasLocation) {
      $globeLabel.innerHTML = 'Location<br>unknown';
      $globeLabel.classList.add('show');
      // 地球の中央に固定表示
      $globeLabel.style.left = '50%';
      $globeLabel.style.top = '50%';
      $globeLabel.style.opacity = '1';
      $globeLabel.style.transform = 'translate(-50%, -50%)';
      $globeLabel.style.textAlign = 'center';
    } else {
      $globeLabel.textContent = '';
      $globeLabel.classList.remove('show');
      $globeLabel.style.left = '';
      $globeLabel.style.top = '';
      $globeLabel.style.opacity = '';
    }

    const GLOBE_THETA = 0.15; // fixed slight tilt — keeps north pole at top
    const GLOBE_RADIUS = 112.5; // display radius in px (225/2)
    let currentPhi;

    // ピンの2Dスクリーン座標を計算してラベルを配置
    function updateLabelPosition(phi, theta) {
      if (!hasLocation || !locationName) return;
      const [lat, lon] = location;
      const latRad = lat * (Math.PI / 180);
      const lonRad = lon * (Math.PI / 180);
      // COBE座標系: phi + lon + PI/2 が水平角
      const angle = lonRad + phi + Math.PI / 2;
      const x1 = Math.cos(latRad) * Math.sin(angle);
      const y0 = Math.sin(latRad);
      const z1 = Math.cos(latRad) * Math.cos(angle);
      // theta回転（X軸）
      const y2 = y0 * Math.cos(theta) - z1 * Math.sin(theta);
      const z2 = y0 * Math.sin(theta) + z1 * Math.cos(theta);
      // 可視判定（手前側のみ）
      if (z2 < 0.2) {
        $globeLabel.style.opacity = '0';
        return;
      }
      // 2Dスクリーン投影
      const sx = GLOBE_RADIUS + x1 * GLOBE_RADIUS;
      const sy = GLOBE_RADIUS - y2 * GLOBE_RADIUS;
      $globeLabel.style.left = sx + 'px';
      if (lat >= 0) {
        // 北半球: ピンの上にラベル（下端基準）
        $globeLabel.style.top = (sy - 16) + 'px';
        $globeLabel.style.transform = 'translate(-50%, -100%)';
      } else {
        // 南半球: ピンの下にラベル（上端基準）
        $globeLabel.style.top = (sy + 16) + 'px';
        $globeLabel.style.transform = 'translate(-50%, 0%)';
      }
      $globeLabel.style.opacity = String(Math.min(1, (z2 - 0.2) * 2));
    }

    if (hasLocation) {
      const [lat, lon] = location;
      const targetPhi = -lon * (Math.PI / 180) - Math.PI / 2;
      currentPhi = targetPhi - 3;
      var onRender = (state) => {
        currentPhi += (targetPhi - currentPhi) * 0.04;
        state.phi = currentPhi;
        state.theta = GLOBE_THETA;
        updateLabelPosition(currentPhi, GLOBE_THETA);
      };
    } else {
      currentPhi = 0;
      var onRender = (state) => {
        currentPhi += 0.012;
        state.phi = currentPhi;
        state.theta = GLOBE_THETA;
      };
    }

    const size = 225 * 2;
    freshCanvas.width = size;
    freshCanvas.height = size;

    globeInstance = createGlobeFn(freshCanvas, {
      devicePixelRatio: 2,
      width: size,
      height: size,
      phi: currentPhi,
      theta: GLOBE_THETA,
      dark: 1,
      diffuse: 1.2,
      scale: 1,
      mapSamples: 16000,
      mapBrightness: 6,
      baseColor: [0.3, 0.3, 0.3],
      markerColor: [1, 0.5, 0.2],
      glowColor: [0.1, 0.1, 0.1],
      markers,
      onRender,
    });

    $globe.classList.add('show');
  }

  const WEATHER_EMOJI = {
    0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
    45: '🌫️', 48: '🌫️',

  let weatherLocation = null;
  const LOCATION_CACHE_KEY = 'fernweh_location';
  const LOCATION_CACHE_TTL = 24 * 60 * 60 * 1000; // 24 hours

  function getCachedLocation() {
    try {
      const cached = JSON.parse(localStorage.getItem(LOCATION_CACHE_KEY));
      if (cached && Date.now() - cached.ts < LOCATION_CACHE_TTL) {
        return { latitude: cached.lat, longitude: cached.lon, city: cached.city || null };
      }
    } catch {}
    return null;
  }

  function cacheLocation(lat, lon, city) {
    localStorage.setItem(LOCATION_CACHE_KEY, JSON.stringify({ lat, lon, city: city || null, ts: Date.now() }));
  }

  async function getLocationByIP() {
    const res = await fetch('https://ipapi.co/json/');
    if (!res.ok) throw new Error(`IP geolocation failed: ${res.status}`);
    const data = await res.json();
    return { latitude: data.latitude, longitude: data.longitude, city: data.city || null };
  }

  async function reverseGeocode(lat, lon) {
    try {
      const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
      if (!res.ok) return null;
      const data = await res.json();
      return data.city || data.locality || null;
    } catch { return null; }
  }

  function getLocationByGeolocation() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error('Geolocation not supported'));
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
        err => reject(err),
        { timeout: 10000, maximumAge: 600000 }
      );
    });
  }

  async function initWeather() {
    // 1. Check cache
    const cached = getCachedLocation();
    if (cached) {
      weatherLocation = cached;
      displayLocationName(cached.city);
      updateWeather();
      setInterval(updateWeather, 30 * 60 * 1000);
      // Refresh location in background
      resolveLocation().catch(() => {});
      return;
    }

    // 2. Resolve location
    await resolveLocation();
    updateWeather();
    setInterval(updateWeather, 30 * 60 * 1000);
  }

  function displayLocationName(city) {
    const el = document.getElementById('weather-location');
    if (el && city) el.textContent = city;
  }

  async function resolveLocation() {
    // Step 1: Geolocation API
    try {
      weatherLocation = await getLocationByGeolocation();
      const city = await reverseGeocode(weatherLocation.latitude, weatherLocation.longitude);
      weatherLocation.city = city;
      cacheLocation(weatherLocation.latitude, weatherLocation.longitude, city);
      displayLocationName(city);
      return;
    } catch (e) {
      console.warn('Geolocation denied/failed:', e.message);
    }
    // Step 2: IP Geolocation
    try {
      weatherLocation = await getLocationByIP();
      cacheLocation(weatherLocation.latitude, weatherLocation.longitude, weatherLocation.city);
      displayLocationName(weatherLocation.city);
      return;
    } catch (e) {
      console.warn('IP geolocation failed:', e.message);
    }
    // Step 3: Fallback to Tokyo
    weatherLocation = { latitude: 35.6762, longitude: 139.6503, city: 'Tokyo' };
    displayLocationName('Tokyo');
  }

  async function updateWeather() {
    if (!weatherLocation) return;
    try {
      const { latitude, longitude } = weatherLocation;
      const params = new URLSearchParams({
        latitude,
        longitude,
        daily: 'weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max',
        forecast_days: '7',
        timezone: 'auto',
      });
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
      if (!res.ok) throw new Error(`Weather API: ${res.status}`);
      const data = await res.json();
      const $weather = document.getElementById('weather');
      const days = data.daily.time.length;
      // 行が足りなければ生成
      if ($weather.children.length < days) {
        $weather.innerHTML = '';
        for (let i = 0; i < days; i++) {
          $weather.innerHTML += `<div class="weather-day">
            <span class="weather-label" id="weather-date-${i}"></span>
            <span class="weather-icon" id="weather-icon-${i}"></span>
            <span class="weather-temp" id="weather-temp-${i}"></span>
            <span class="weather-precip" id="weather-precip-${i}"></span>
          </div>`;
        }
      }
      for (let i = 0; i < days; i++) {
        renderWeather(data.daily, i);
      }
    } catch (e) {
      console.warn('Weather update failed:', e);
    }
  }

  function renderWeather(daily, dayIndex) {
    const code = daily.weather_code[dayIndex];
    const tMax = Math.round(daily.temperature_2m_max[dayIndex]);
    const tMin = Math.round(daily.temperature_2m_min[dayIndex]);
    const precip = daily.precipitation_probability_max[dayIndex];
    const d = new Date(daily.time[dayIndex]);
    document.getElementById(`weather-date-${dayIndex}`).textContent =
      `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
    document.getElementById(`weather-icon-${dayIndex}`).textContent = WEATHER_EMOJI[code] || '🌡️';
    document.getElementById(`weather-temp-${dayIndex}`).textContent =
      `${String(tMax).padStart(2, '0')}° / ${String(tMin).padStart(2, '0')}°`;
    document.getElementById(`weather-precip-${dayIndex}`).textContent = `💧${String(precip).padStart(3, '0')}%`;
  }

  // ===== BURN-IN PREVENTION =====
  function shiftOverlays() {
    const offsetX = Math.round(Math.random() * 20 - 10); // -10 to +10px
    const offsetY = Math.round(Math.random() * 20 - 10);
    $clock.style.top = `${30 + offsetY}px`;
    $clock.style.right = `${50 + offsetX}px`;
    $liveBadge.style.top = `${38 + offsetY}px`;
    $liveBadge.style.left = `${50 + offsetX}px`;
    $info.style.padding = `${40 + offsetY}px ${50 + offsetX}px`;
  }

  // ===== INIT =====
  document.addEventListener('mousemove', onMouseMove);

  updateClock();
  setInterval(updateClock, 10000);
  initWeather();
  setInterval(shiftOverlays, 10 * 60 * 1000); // Shift every 10 min

  // 初回ロード時に砂嵐表示
  startNoise();

  // Startup: switchVideo() is called from onYouTubeIframeAPIReady
</script>
</body>
</html>
