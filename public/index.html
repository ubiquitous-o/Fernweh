<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fernweh</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&family=Noto+Sans+JP:wght@200;300;400&display=swap');

  :root {
    --overlay-bg: rgba(0, 0, 0, 0.55);
    --text-primary: rgba(255, 255, 255, 0.92);
    --text-secondary: rgba(255, 255, 255, 0.55);
    --text-dim: rgba(255, 255, 255, 0.25);
    --accent: rgba(255, 90, 60, 0.9);
    --transition-duration: 2.5s;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    color: var(--text-primary);
    cursor: none;
    user-select: none;
  }

  /* --- Video Layers --- */
  .video-layer {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    transition: opacity var(--transition-duration) cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1;
  }
  .video-layer iframe {
    width: 100%; height: 100%;
    border: none;
    pointer-events: none;
  }
  .video-layer.hidden { opacity: 0; z-index: 0; }
  .video-layer.visible { opacity: 1; z-index: 1; }

  /* --- Vignette overlay --- */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%),
      linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 20%),
      linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 10%);
  }

  /* --- Info Overlay --- */
  .info-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 40px 50px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.8s ease, transform 0.8s ease, padding 60s ease;
  }
  .info-overlay.show {
    opacity: 1;
    transform: translateY(0);
  }

  .info-channel {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .info-title {
    font-size: 22px;
    font-weight: 300;
    line-height: 1.4;
    color: var(--text-primary);
    max-width: 700px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .info-query {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-top: 8px;
    font-style: italic;
  }

  /* --- Top-right Clock --- */
  .clock-overlay {
    position: absolute;
    top: 30px;
    right: 50px;
    z-index: 10;
    text-align: right;
    opacity: 0;
    transition: opacity 0.8s ease, top 60s ease, right 60s ease;
  }
  .clock-overlay.show { opacity: 1; }

  .clock-time {
    font-size: 48px;
    font-weight: 200;
    letter-spacing: 4px;
    color: var(--text-primary);
    line-height: 1;
  }
  .clock-date {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* --- Weather location name --- */
  .weather-location {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 3px;
    text-align: right;
    text-transform: uppercase;
  }

  /* --- Weather (below clock) --- */
  .weather-section {
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .weather-day {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .weather-label {
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 3px;
    min-width: 32px;
    text-align: right;
  }

  .weather-icon {
    font-size: 20px;
    line-height: 1;
  }

  .weather-temp {
    color: var(--text-secondary);
    font-size: 16px;
    font-weight: 200;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
  }

  .weather-precip {
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 1px;
    min-width: 44px;
    text-align: right;
  }

  /* --- Live indicator --- */
  .live-badge {
    position: absolute;
    top: 38px;
    left: 50px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.8s ease, top 60s ease, left 60s ease;
  }
  .live-badge.show { opacity: 1; }

  .live-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .live-text {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* --- Progress bar (time until next switch) --- */
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), rgba(255,180,100,0.8));
    z-index: 15;
    transition: width 1s linear;
    opacity: 0.6;
  }

  /* --- Controls (appear on mouse move) --- */
  .controls {
    position: absolute;
    bottom: 40px;
    right: 50px;
    z-index: 20;
    display: flex;
    gap: 12px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  body.mouse-active .controls {
    opacity: 1;
    transform: translateY(0);
  }
  body.mouse-active { cursor: default; }

  .ctrl-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: var(--overlay-bg);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    font-size: 16px;
  }
  .ctrl-btn:hover {
    border-color: rgba(255,255,255,0.5);
    color: var(--text-primary);
    background: rgba(255,255,255,0.1);
  }

  /* --- Loading state --- */
  .loading-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    transition: opacity 1s ease;
  }
  .loading-overlay.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .loading-text {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--text-secondary);
    animation: breathe 2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* --- Error --- */
  .error-overlay {
    position: absolute;
    inset: 0;
    z-index: 25;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
  }
  .error-overlay.show {
    display: flex;
  }
  .error-msg {
    font-size: 14px;
    font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<!-- Two video layers for crossfade -->
<div class="video-layer visible" id="layer-a">
  <div id="player-a"></div>
</div>
<div class="video-layer hidden" id="layer-b">
  <div id="player-b"></div>
</div>

<!-- Vignette -->
<div class="vignette"></div>

<!-- Live badge -->
<div class="live-badge" id="live-badge">
  <div class="live-dot"></div>
  <span class="live-text">Live</span>
</div>

<!-- Clock -->
<div class="clock-overlay" id="clock">
  <div class="clock-time" id="clock-time"></div>
  <div class="clock-date" id="clock-date"></div>
  <div class="weather-location" id="weather-location"></div>
  <div class="weather-section" id="weather">
    <div class="weather-day">
      <span class="weather-label">Today</span>
      <span class="weather-icon" id="weather-icon-today"></span>
      <span class="weather-temp" id="weather-temp-today"></span>
      <span class="weather-precip" id="weather-precip-today"></span>
    </div>
    <div class="weather-day">
      <span class="weather-label">Tomorrow</span>
      <span class="weather-icon" id="weather-icon-tomorrow"></span>
      <span class="weather-temp" id="weather-temp-tomorrow"></span>
      <span class="weather-precip" id="weather-precip-tomorrow"></span>
    </div>
  </div>
</div>

<!-- Info -->
<div class="info-overlay" id="info">
  <div class="info-channel" id="info-channel"></div>
  <div class="info-title" id="info-title"></div>
  <div class="info-query" id="info-query"></div>
</div>

<!-- Progress -->
<div class="progress-bar" id="progress"></div>

<!-- Controls -->
<div class="controls">
  <div class="ctrl-btn" id="btn-skip" title="Skip">⏭</div>
  <div class="ctrl-btn" id="btn-fullscreen" title="Fullscreen">⛶</div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="loading-text">Exploring the world live camera...</div>
</div>

<!-- Error -->
<div class="error-overlay" id="error">
  <div class="error-msg" id="error-msg">Connection error</div>
</div>

<script>
  // ===== CONFIG =====
  const SWITCH_INTERVAL_MS = 60 * 60 * 1000; // 1 hour

  // ===== STATE =====
  let activeLayer = 'a';
  let switchTimer = null;
  let progressTimer = null;
  let switchStartTime = 0;
  let mouseTimer = null;
  let currentInfo = null;

  // ===== ELEMENTS =====
  const $layerA = document.getElementById('layer-a');
  const $layerB = document.getElementById('layer-b');
  const $info = document.getElementById('info');
  const $infoTitle = document.getElementById('info-title');
  const $infoChannel = document.getElementById('info-channel');
  const $infoQuery = document.getElementById('info-query');
  const $clock = document.getElementById('clock');
  const $clockTime = document.getElementById('clock-time');
  const $clockDate = document.getElementById('clock-date');
  const $liveBadge = document.getElementById('live-badge');
  const $progress = document.getElementById('progress');
  const $loading = document.getElementById('loading');
  const $error = document.getElementById('error');
  const $errorMsg = document.getElementById('error-msg');

  // ===== YouTube IFrame Player API =====
  let ytApiReady = false;
  const players = { a: null, b: null };
  const PLAYBACK_TIMEOUT = 15000; // Skip if not playing within 15s

  window.onYouTubeIframeAPIReady = () => {
    ytApiReady = true;
    switchVideo();
  };

  // Fallback if YouTube IFrame API fails to load
  setTimeout(() => {
    if (!ytApiReady) {
      console.error('YouTube IFrame API failed to load. Reloading...');
      location.reload();
    }
  }, 30000);

  function createPlayer(layerId, videoId) {
    return new Promise((resolve, reject) => {
      const elementId = `player-${layerId}`;
      let settled = false;
      let timeoutId = null;

      // Timeout: fail if playback doesn't start
      timeoutId = setTimeout(() => {
        if (!settled) {
          settled = true;
          console.warn(`⏰ Playback timeout: ${videoId}`);
          reject(new Error('Playback timeout'));
        }
      }, PLAYBACK_TIMEOUT);

      // Destroy old player
      if (players[layerId]) {
        try { players[layerId].destroy(); } catch (e) {}
        players[layerId] = null;
      }

      // Recreate player div
      const $layer = layerId === 'a' ? $layerA : $layerB;
      $layer.innerHTML = `<div id="${elementId}"></div>`;

      players[layerId] = new YT.Player(elementId, {
        videoId,
        playerVars: {
          autoplay: 1,
          mute: 1,
          controls: 0,
          showinfo: 0,
          rel: 0,
          modestbranding: 1,
          iv_load_policy: 3,
          loop: 1,
          playlist: videoId,
          enablejsapi: 1,
          origin: location.origin,
        },
        events: {
          onReady: (e) => {
            e.target.mute();
            e.target.playVideo();
          },
          onStateChange: (e) => {
            // YT.PlayerState.PLAYING === 1
            if (e.data === 1 && !settled) {
              settled = true;
              clearTimeout(timeoutId);
              resolve();
            }
          },
          onError: (e) => {
            if (!settled) {
              settled = true;
              clearTimeout(timeoutId);
              console.warn(`❌ Player error (code ${e.data}): ${videoId}`);
              reject(new Error(`Player error: ${e.data}`));
            }
          },
        },
      });
    });
  }

  // ===== VIDEO POOL (from videos.json) =====
  let videoPool = [];
  let videosLoaded = false;

  // Track watched videos in localStorage to avoid repeats
  const WATCHED_KEY = 'fernweh_watched';
  const MAX_WATCHED = 150;

  function getWatched() {
    try {
      return JSON.parse(localStorage.getItem(WATCHED_KEY) || '[]');
    } catch { return []; }
  }

  function addWatched(videoId) {
    const watched = getWatched();
    if (!watched.includes(videoId)) {
      watched.push(videoId);
      // Keep only the most recent entries
      while (watched.length > MAX_WATCHED) watched.shift();
      localStorage.setItem(WATCHED_KEY, JSON.stringify(watched));
    }
  }

  async function loadVideoPool() {
    const res = await fetch('videos.json');
    if (!res.ok) throw new Error(`Failed to load videos.json: ${res.status}`);
    const allVideos = await res.json();

    // Filter out already-watched videos
    const watched = new Set(getWatched());
    videoPool = allVideos.filter(v => !watched.has(v.videoId));

    // If all have been watched, reset and use the full list
    if (videoPool.length === 0) {
      localStorage.removeItem(WATCHED_KEY);
      videoPool = [...allVideos];
    }

    // Shuffle for variety
    for (let i = videoPool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [videoPool[i], videoPool[j]] = [videoPool[j], videoPool[i]];
    }

    videosLoaded = true;
  }

  async function fetchNext() {
    if (!videosLoaded || videoPool.length === 0) {
      await loadVideoPool();
    }
    if (videoPool.length === 0) {
      throw new Error('No videos available in videos.json');
    }
    const video = videoPool.shift();
    addWatched(video.videoId);
    return video;
  }

  // ===== SWITCH VIDEO =====
  async function switchVideo() {
    if (!ytApiReady) return;
    try {
      $error.classList.remove('show');
      const data = await fetchNext();

      // Create player on next layer and wait for playback confirmation
      const nextLayerId = activeLayer === 'a' ? 'b' : 'a';
      const $nextLayer = nextLayerId === 'a' ? $layerA : $layerB;
      const $currentLayer = activeLayer === 'a' ? $layerA : $layerB;

      await createPlayer(nextLayerId, data.videoId);

      // Playback confirmed -> crossfade
      currentInfo = data;

      $nextLayer.classList.remove('hidden');
      $nextLayer.classList.add('visible');
      $currentLayer.classList.remove('visible');
      $currentLayer.classList.add('hidden');

      // Destroy old player after fade
      const oldLayerId = activeLayer;
      setTimeout(() => {
        if (players[oldLayerId]) {
          try { players[oldLayerId].destroy(); } catch (e) {}
          players[oldLayerId] = null;
        }
        $currentLayer.innerHTML = `<div id="player-${oldLayerId}"></div>`;
      }, 3000);

      activeLayer = nextLayerId;

      // Hide loading
      $loading.classList.add('fade-out');

      // Show info
      showInfo(data);
      showOverlays();

      // Reset timer
      resetSwitchTimer();

    } catch (err) {
      console.error('switchVideo error:', err);
      const delay = err.retryAfter > 0 ? err.retryAfter * 1000 : 3000;
      setTimeout(switchVideo, delay);
    }
  }

  // ===== INFO DISPLAY =====
  function showInfo(data) {
    $infoChannel.textContent = data.channel || '';
    $infoTitle.textContent = data.title || '';
    $infoQuery.textContent = `🔍 ${data.query || ''}`;
    $info.classList.add('show');
  }

  function showOverlays() {
    $clock.classList.add('show');
    $liveBadge.classList.add('show');
  }

  // ===== PROGRESS BAR =====
  function resetSwitchTimer() {
    clearTimeout(switchTimer);
    clearInterval(progressTimer);

    switchStartTime = Date.now();
    $progress.style.width = '0%';

    progressTimer = setInterval(() => {
      const elapsed = Date.now() - switchStartTime;
      const pct = Math.min((elapsed / SWITCH_INTERVAL_MS) * 100, 100);
      $progress.style.width = `${pct}%`;
    }, 1000);

    switchTimer = setTimeout(switchVideo, SWITCH_INTERVAL_MS);
  }

  // ===== CLOCK =====
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    $clockTime.textContent = `${h}:${m}`;

    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const y = now.getFullYear();
    const mo = now.getMonth() + 1;
    const d = now.getDate();
    const day = days[now.getDay()];
    $clockDate.textContent = `${y}.${String(mo).padStart(2,'0')}.${String(d).padStart(2,'0')} ${day}`;
  }

  // ===== ERROR =====
  function showError(msg) {
    $errorMsg.textContent = msg || 'Connection error';
    $error.classList.add('show');
  }

  // ===== MOUSE ACTIVITY =====
  function onMouseMove() {
    document.body.classList.add('mouse-active');
    clearTimeout(mouseTimer);
    mouseTimer = setTimeout(() => {
      document.body.classList.remove('mouse-active');
    }, 3000);
  }

  // ===== CONTROLS =====
  document.getElementById('btn-skip').addEventListener('click', (e) => {
    e.stopPropagation();
    switchVideo();
  });

  function toggleFullscreen() {
    const el = document.documentElement;
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el).catch(() => {});
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document).catch(() => {});
    }
  }

  document.getElementById('btn-fullscreen').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleFullscreen();
  });

  // ===== KEYBOARD =====
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'ArrowRight' || e.key === 'n') {
      switchVideo();
    } else if (e.key === 'f' || e.key === 'F11') {
      e.preventDefault();
      toggleFullscreen();
    }
  });

  // ===== WEATHER =====
  const WEATHER_EMOJI = {
    0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
    45: '🌫️', 48: '🌫️',
    51: '🌦️', 53: '🌦️', 55: '🌧️',
    56: '🌧️', 57: '🌧️',
    61: '🌧️', 63: '🌧️', 65: '🌧️',
    66: '🌧️', 67: '🌧️',
    71: '🌨️', 73: '🌨️', 75: '❄️', 77: '🌨️',
    80: '🌦️', 81: '🌧️', 82: '🌧️',
    85: '🌨️', 86: '🌨️',
    95: '⛈️', 96: '⛈️', 99: '⛈️',
  };

  let weatherLocation = null;
  const LOCATION_CACHE_KEY = 'fernweh_location';
  const LOCATION_CACHE_TTL = 24 * 60 * 60 * 1000; // 24 hours

  function getCachedLocation() {
    try {
      const cached = JSON.parse(localStorage.getItem(LOCATION_CACHE_KEY));
      if (cached && Date.now() - cached.ts < LOCATION_CACHE_TTL) {
        return { latitude: cached.lat, longitude: cached.lon, city: cached.city || null };
      }
    } catch {}
    return null;
  }

  function cacheLocation(lat, lon, city) {
    localStorage.setItem(LOCATION_CACHE_KEY, JSON.stringify({ lat, lon, city: city || null, ts: Date.now() }));
  }

  async function getLocationByIP() {
    const res = await fetch('https://ipapi.co/json/');
    if (!res.ok) throw new Error(`IP geolocation failed: ${res.status}`);
    const data = await res.json();
    return { latitude: data.latitude, longitude: data.longitude, city: data.city || null };
  }

  async function reverseGeocode(lat, lon) {
    try {
      const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
      if (!res.ok) return null;
      const data = await res.json();
      return data.city || data.locality || null;
    } catch { return null; }
  }

  function getLocationByGeolocation() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error('Geolocation not supported'));
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
        err => reject(err),
        { timeout: 10000, maximumAge: 600000 }
      );
    });
  }

  async function initWeather() {
    // 1. Check cache
    const cached = getCachedLocation();
    if (cached) {
      weatherLocation = cached;
      displayLocationName(cached.city);
      updateWeather();
      setInterval(updateWeather, 30 * 60 * 1000);
      // Refresh location in background
      resolveLocation().catch(() => {});
      return;
    }

    // 2. Resolve location
    await resolveLocation();
    updateWeather();
    setInterval(updateWeather, 30 * 60 * 1000);
  }

  function displayLocationName(city) {
    const el = document.getElementById('weather-location');
    if (el && city) el.textContent = city;
  }

  async function resolveLocation() {
    // Step 1: Geolocation API
    try {
      weatherLocation = await getLocationByGeolocation();
      const city = await reverseGeocode(weatherLocation.latitude, weatherLocation.longitude);
      weatherLocation.city = city;
      cacheLocation(weatherLocation.latitude, weatherLocation.longitude, city);
      displayLocationName(city);
      return;
    } catch (e) {
      console.warn('Geolocation denied/failed:', e.message);
    }
    // Step 2: IP Geolocation
    try {
      weatherLocation = await getLocationByIP();
      cacheLocation(weatherLocation.latitude, weatherLocation.longitude, weatherLocation.city);
      displayLocationName(weatherLocation.city);
      return;
    } catch (e) {
      console.warn('IP geolocation failed:', e.message);
    }
    // Step 3: Fallback to Tokyo
    weatherLocation = { latitude: 35.6762, longitude: 139.6503, city: 'Tokyo' };
    displayLocationName('Tokyo');
  }

  async function updateWeather() {
    if (!weatherLocation) return;
    try {
      const { latitude, longitude } = weatherLocation;
      const params = new URLSearchParams({
        latitude,
        longitude,
        daily: 'weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max',
        forecast_days: '2',
        timezone: 'auto',
      });
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
      if (!res.ok) throw new Error(`Weather API: ${res.status}`);
      const data = await res.json();
      renderWeather(data.daily, 0, 'today');
      renderWeather(data.daily, 1, 'tomorrow');
    } catch (e) {
      console.warn('Weather update failed:', e);
    }
  }

  function renderWeather(daily, dayIndex, suffix) {
    const code = daily.weather_code[dayIndex];
    const tMax = Math.round(daily.temperature_2m_max[dayIndex]);
    const tMin = Math.round(daily.temperature_2m_min[dayIndex]);
    const precip = daily.precipitation_probability_max[dayIndex];
    document.getElementById(`weather-icon-${suffix}`).textContent = WEATHER_EMOJI[code] || '🌡️';
    document.getElementById(`weather-temp-${suffix}`).textContent = `${tMax}° / ${tMin}°`;
    document.getElementById(`weather-precip-${suffix}`).textContent = precip > 0 ? `💧${precip}%` : '';
  }

  // ===== BURN-IN PREVENTION =====
  function shiftOverlays() {
    const offsetX = Math.round(Math.random() * 20 - 10); // -10 to +10px
    const offsetY = Math.round(Math.random() * 20 - 10);
    $clock.style.top = `${30 + offsetY}px`;
    $clock.style.right = `${50 + offsetX}px`;
    $liveBadge.style.top = `${38 + offsetY}px`;
    $liveBadge.style.left = `${50 + offsetX}px`;
    $info.style.padding = `${40 + offsetY}px ${50 + offsetX}px`;
  }

  // ===== INIT =====
  document.addEventListener('mousemove', onMouseMove);

  updateClock();
  setInterval(updateClock, 10000);
  initWeather();
  setInterval(shiftOverlays, 10 * 60 * 1000); // Shift every 10 min

  // Startup: switchVideo() is called from onYouTubeIframeAPIReady
</script>
</body>
</html>
